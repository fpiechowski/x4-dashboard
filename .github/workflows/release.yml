name: Release Assets

on:
  push:
    tags:
      - 'v*'

jobs:
  packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Validate release
        run: npm run release:check

      - name: Build release bundles
        run: npm run release:bundle -- ${{ env.RELEASE_VERSION }}

      - name: Archive release packages
        run: |
          cd dist
          tar -czf x4-dashboard-server-${{ env.RELEASE_VERSION }}.tar.gz x4-dashboard-server-${{ env.RELEASE_VERSION }}
          zip -qr x4-dashboard-server-${{ env.RELEASE_VERSION }}.zip x4-dashboard-server-${{ env.RELEASE_VERSION }}
          zip -qr x4-dashboard-lua-mod-${{ env.RELEASE_VERSION }}.zip x4-dashboard-lua-mod-${{ env.RELEASE_VERSION }}

      - name: Upload release assets
        # Note: softprops/action-gh-release v2.x uses node20 internally.
        # All v2 versions declare node20; there is currently no v2 release with node22+.
        # Monitor https://github.com/softprops/action-gh-release/releases for a node22 upgrade.
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            dist/x4-dashboard-server-${{ env.RELEASE_VERSION }}.tar.gz
            dist/x4-dashboard-server-${{ env.RELEASE_VERSION }}.zip
            dist/x4-dashboard-lua-mod-${{ env.RELEASE_VERSION }}.zip

  desktop-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Build Windows desktop app
        run: npm run desktop:dist

      - name: Upload desktop release assets
        # Note: softprops/action-gh-release v2.x uses node20 internally.
        # All v2 versions declare node20; there is currently no v2 release with node22+.
        # Monitor https://github.com/softprops/action-gh-release/releases for a node22 upgrade.
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: |
            release/*.exe
