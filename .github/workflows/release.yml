name: Release Assets

on:
  push:
    tags:
      - 'v*'

jobs:
  bundle:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Install client dependencies
        run: npm --prefix client ci

      - name: Validate release
        run: npm run release:check

      - name: Build release bundle
        run: npm run dist:bundle -- ${{ env.RELEASE_VERSION }}

      - name: Archive release bundle
        run: |
          cd dist
          tar -czf x4-dashboard-${{ env.RELEASE_VERSION }}.tar.gz x4-dashboard-${{ env.RELEASE_VERSION }}
          zip -qr x4-dashboard-${{ env.RELEASE_VERSION }}.zip x4-dashboard-${{ env.RELEASE_VERSION }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/x4-dashboard-${{ env.RELEASE_VERSION }}.tar.gz
            dist/x4-dashboard-${{ env.RELEASE_VERSION }}.zip
